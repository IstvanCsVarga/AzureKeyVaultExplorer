name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a feature? We'd love to hear it. Please describe the problem you're trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the use case?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app does this affect?
      options:
        - Authentication / Tenants
        - Vault browsing / Tree view
        - Secrets / Keys / Certificates
        - Search / Filtering
        - Settings
        - UI / UX
        - CI / Build / Packaging
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Mockups, screenshots, links to similar features in other tools, etc.
