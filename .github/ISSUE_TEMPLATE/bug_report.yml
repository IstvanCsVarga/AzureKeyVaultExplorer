name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Open the app
        2. Select tenant '...'
        3. Click on vault '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or screenshots if available.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows x64
        - Windows ARM
        - Linux x64
    validations:
      required: true

  - type: dropdown
    id: launch-method
    attributes:
      label: How did you launch the app?
      description: Behavior can differ between terminal and .app bundle launches.
      options:
        - ".app bundle (Finder / double-click)"
        - "dotnet run (terminal)"
        - "Other"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      description: Found in Settings page or the release tag you downloaded.
      placeholder: "v1.0.8"
    validations:
      required: true

  - type: input
    id: az-version
    attributes:
      label: Azure CLI Version
      description: "Run `az --version` and paste the first line."
      placeholder: "azure-cli 2.68.0"

  - type: dropdown
    id: regression
    attributes:
      label: Is this a regression?
      description: Did this work in a previous version?
      options:
        - "Yes"
        - "No"
        - "Not sure"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Logs, screenshots, or anything else that might help.
