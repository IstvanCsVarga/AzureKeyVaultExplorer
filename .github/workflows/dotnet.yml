name: .NET Build and Publish

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - uses: actions/cache@v3
      with:
          path: ~/.nuget/win-packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            win-nuget
    - name: Publish Windows
      run: |
        ./src/avalonia/build.ps1 -Runtime win-x64 -PublishAot -BuildNumber '1.0.${{github.run_number }}'
      shell: pwsh
    - name: Create Package
      run: |
        Compress-Archive -Path ".\src\publish\*" -DestinationPath "KeyVaultExplorer-win-x64.zip"
      shell: pwsh
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KeyVaultExplorer-win-x64
        path: KeyVaultExplorer-win-x64.zip

  build_windows_arm:
    name: Build Windows ARM
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - uses: actions/cache@v3
      with:
          path: ~/.nuget/win-packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            winarm-nuget
    - name: Publish Windows ARM
      run: |
        ./src/avalonia/build.ps1 -Runtime win-arm64 -PublishAot -BuildNumber '1.0.${{github.run_number }}'
      shell: pwsh
    - name: Create Package
      run: |
        Compress-Archive -Path ".\src\publish\*" -DestinationPath "KeyVaultExplorer-win-arm64.zip"
      shell: pwsh
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KeyVaultExplorer-win-arm64
        path: KeyVaultExplorer-win-arm64.zip

  build_macos:
    name: Build macOS Arm64
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - uses: actions/cache@v3
      with:
          path: ~/.nuget/macos-arm-packages
          key: ${{ runner.os }}-armnuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            mac-arm-nuget
    - name: Publish macOS Arm
      run: |
        ./src/avalonia/build.ps1 -Runtime osx-arm64 -PublishAot:$false -BuildNumber '1.0.${{github.run_number }}'
      shell: pwsh
    - name: Create macOS App Bundle
      run: |
        APP_NAME="Key Vault Explorer.app"
        mkdir -p "${APP_NAME}/Contents/MacOS"
        mkdir -p "${APP_NAME}/Contents/Resources"

        # Copy binary and libs into bundle
        cp -R src/publish/* "${APP_NAME}/Contents/MacOS/"
        rm -f "${APP_NAME}/Contents/MacOS/"*.pdb "${APP_NAME}/Contents/MacOS/"*.dsym

        # Copy Info.plist and icon
        cp src/avalonia/KeyVaultExplorer/Assets/Info.plist "${APP_NAME}/Contents/"
        cp src/avalonia/KeyVaultExplorer/Assets/AppIcon.icns "${APP_NAME}/Contents/Resources/"

        # Make executable
        chmod +x "${APP_NAME}/Contents/MacOS/keyvaultexplorerdesktop"

        # Create zip with the .app bundle
        ditto -c -k --sequesterRsrc --keepParent "${APP_NAME}" "KeyVaultExplorer-macOS-arm64.zip"
      shell: bash
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KeyVaultExplorer-macOS-arm64
        path: KeyVaultExplorer-macOS-arm64.zip

  build_linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - uses: actions/cache@v3
      with:
          path: ~/.nuget/linux-packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            linux-nuget
    - name: Publish Linux
      run: |
        ./src/avalonia/build.ps1 -Runtime linux-x64 -PublishAot:$false -BuildNumber '1.0.${{github.run_number }}'
      shell: pwsh
    - name: Create Package
      run: tar -czf KeyVaultExplorer-linux-x64.tar.gz -C src/publish .
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KeyVaultExplorer-linux-x64
        path: KeyVaultExplorer-linux-x64.tar.gz

  release:
    name: Release
    needs: [ build_macos, build_windows, build_windows_arm, build_linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download built artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        run: |
          TAG="v1.0.${{ github.run_number }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "## Downloads

          | Platform | File |
          |----------|------|
          | macOS (Apple Silicon) | KeyVaultExplorer-macOS-arm64.zip |
          | Windows x64 | KeyVaultExplorer-win-x64.zip |
          | Windows ARM | KeyVaultExplorer-win-arm64.zip |
          | Linux x64 | KeyVaultExplorer-linux-x64.tar.gz |

          ### macOS Install
          1. Download and unzip
          2. Drag **Key Vault Explorer.app** to Applications
          3. If blocked: \`xattr -cr /Applications/Key\\ Vault\\ Explorer.app\`

          ### Prerequisites
          - [Azure CLI](https://aka.ms/installazurecli) installed
          - Run \`az login\` (or the app will prompt you via browser)" \
            ./KeyVaultExplorer-macOS-arm64/KeyVaultExplorer-macOS-arm64.zip \
            ./KeyVaultExplorer-win-x64/KeyVaultExplorer-win-x64.zip \
            ./KeyVaultExplorer-win-arm64/KeyVaultExplorer-win-arm64.zip \
            ./KeyVaultExplorer-linux-x64/KeyVaultExplorer-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
